<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOKA</title>

<link rel="icon" href="https://i.ibb.co/Mqrzhbr/IMG-3020.jpg">
<link rel="apple-touch-icon" href="https://i.ibb.co/Mqrzhbr/IMG-3020.jpg">

<meta name="theme-color" content="#0b0b0b">

<!-- PWA Manifest داخل الصفحة (بدون ملف خارجي) -->
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;:&quot;BOKA App&quot;,
  &quot;short_name&quot;:&quot;BOKA&quot;,
  &quot;start_url&quot;:&quot;/VipDizrt/&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0b0b0b&quot;,
  &quot;theme_color&quot;:&quot;#ff3b3b&quot;,
  &quot;icons&quot;:[{
    &quot;src&quot;:&quot;https://i.ibb.co/Mqrzhbr/IMG-3020.jpg&quot;,
    &quot;sizes&quot;:&quot;192x192&quot;,
    &quot;type&quot;:&quot;image/png&quot;
  }]
}">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  background:#0b0b0b;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  flex-direction:column;
}

.glow{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#ff3b3b33,transparent 70%);
  filter:blur(80px);
  z-index:-1;
}

button{
  padding:15px 25px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:#160d0d;
  color:#fff;
  margin:10px;
}

button:hover{
  background:#221515;
}
</style>

</head>

<body>

<div class="glow"></div>

<h1 style="color:#ff3b3b">BOKA APP</h1>

<button id="installBtn">📲 تثبيت التطبيق</button>

<script>

let deferredPrompt;

// يظهر زر التثبيت الحقيقي
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  } else {
    alert("افتح الموقع من Chrome وانتظر ثواني ثم حاول مرة ثانية");
  }
});

// Service Worker (PWA تشغيل فعلي)
const swCode = `
self.addEventListener("install", e=>{
  self.skipWaiting();
});

self.addEventListener("fetch", e=>{
  e.respondWith(fetch(e.request).catch(()=>new Response("Offline")));
});
`;

const blob = new Blob([swCode], {type:"text/javascript"});
const swURL = URL.createObjectURL(blob);

navigator.serviceWorker.register(swURL)
.then(()=>console.log("SW Ready"));

</script>

</body>
</html>
